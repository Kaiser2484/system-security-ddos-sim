# ─────────────────────────────────────────────────────────────────────────────
# nginx/nginx_defended.conf
# Phase 3 – Defense Mechanisms
#
# Defenses implemented:
#   1. Rate Limiting   (limit_req)  → chặn HTTP Flood
#   2. Connection Limiting (limit_conn) → chặn Slowloris
#   3. Timeout tuning               → đóng kết nối chậm sớm
#   4. Buffer limits                → ngăn large-body attack
#
# So sánh với nginx.conf (Phase 1 – không có defense):
#   - Thêm limit_req_zone  + limit_req
#   - Thêm limit_conn_zone + limit_conn
#   - Giảm client_header_timeout từ mặc định (60s) xuống 5s
#   - Thêm limit_req_status / limit_conn_status = 429
# ─────────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      'upstream_rt=$upstream_response_time '
                      'limit_req=$limit_req_status';   # ← ghi lại khi bị rate-limit

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    gzip            on;

    # ── DEFENSE 1: Rate Limiting Zone ────────────────────────────────────────
    # Tạo vùng nhớ shared 10MB lưu trạng thái theo IP khách ($binary_remote_addr)
    # rate=20r/s → mỗi IP chỉ được tối đa 20 request/giây
    limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=20r/s;

    # Khi vượt rate limit → trả về 429 Too Many Requests (thay vì 503)
    limit_req_status 429;

    # ── DEFENSE 2: Connection Limiting Zone ──────────────────────────────────
    # Mỗi IP chỉ được giữ tối đa N kết nối đồng thời → chặn Slowloris
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 429;

    # ── Timeouts (Slowloris mitigation) ──────────────────────────────────────
    # Đóng kết nối nếu client không gửi xong header trong 5s
    # (Slowloris cố tình gửi chậm → bị ngắt trước khi chiếm hết slot)
    client_header_timeout  5s;
    client_body_timeout    10s;
    send_timeout           10s;
    keepalive_timeout      30s;

    # Giới hạn kích thước body (ngăn POST flood với payload lớn)
    client_max_body_size   1m;
    client_body_buffer_size 16k;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream target_web_upstream {
        server target_web:5000;
        keepalive 32;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── DEFENSE 1 applied: Rate limit trên /api/data ─────────────────────
        # burst=40  → cho phép tối đa 40 request "vượt mức" xếp hàng chờ
        # nodelay   → xử lý ngay burst thay vì delay đều
        # Sau khi queue đầy → trả 429 ngay lập tức
        location /api/data {
            limit_req  zone=api_ratelimit burst=40 nodelay;
            limit_conn conn_limit 15;       # ← DEFENSE 2: max 15 conn/IP

            proxy_pass         http://target_web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     15s;

            # Thêm header thông báo cho client biết bị rate-limit
            add_header X-RateLimit-Policy "20r/s burst=40" always;
        }

        # ── Route mặc định (rate limit nhẹ hơn) ─────────────────────────────
        location / {
            limit_req  zone=api_ratelimit burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_pass         http://target_web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     15s;
        }

        # ── Health check (bỏ qua rate limit) ─────────────────────────────────
        location /health {
            proxy_pass http://target_web_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Nginx status (metrics exporter) ───────────────────────────────────
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny  all;
            access_log off;
        }

        # ── Custom error pages ────────────────────────────────────────────────
        # 429 Too Many Requests — trả về JSON thân thiện
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Try again later.","status":429}';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
