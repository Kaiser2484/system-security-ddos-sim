# ─────────────────────────────────────────────────────────────────────────────
# nginx/nginx.conf
# Phase 1 – Base Infrastructure (NO Rate Limiting)
#
# Role: Reverse proxy in front of target_web.
# Traffic flow: Client → Nginx:80 → target_web:5000
# ─────────────────────────────────────────────────────────────────────────────

# Run as the default nginx user
user nginx;

# Auto-detect number of CPU cores
worker_processes auto;

# Error log location and level
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    # Custom log format: includes upstream response time for latency tracking
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream_rt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;

    # ── Upstream: target_web service ─────────────────────────────────────────
    upstream target_web_upstream {
        server target_web:5000;

        # Simple keepalive pool – reduces connection overhead
        keepalive 32;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Proxy all traffic to target_web ───────────────────────────────────
        location / {
            proxy_pass         http://target_web_upstream;
            proxy_http_version 1.1;

            # Required for keepalive with upstream
            proxy_set_header   Connection        "";

            # Forward real client info
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # ── Health-check endpoint (bypass to upstream) ───────────────────────
        location /health {
            proxy_pass http://target_web_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Nginx status page (for monitoring/metrics exporter) ───────────────
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker internal networks
            deny  all;
            access_log off;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
